global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: "api1"
    metrics_path: /metrics
    static_configs:
      - targets: ["api1:8080"]

  - job_name: "api2"
    metrics_path: /metrics
    static_configs:
      - targets: ["api2:8080"]

  - job_name: "api3"
    metrics_path: /metrics
    static_configs:
      - targets: ["api3:8080"]