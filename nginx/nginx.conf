events {
    worker_connections 1024;
}

http {

    upstream api {
        server api1:8080;
        server api2:8080;
        server api3:8080;
    }


    server {
        listen 80;

        location /stub_status {
            stub_status;
            access_log off;
            allow all;
        }

         location / {
                proxy_pass http://api;
         }
    }
}